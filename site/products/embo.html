    .mela-wrapper {
        margin: 0; padding: 0; box-sizing: border-box;
        background-color: #ffffff; color: #1d1d1f;
        font-family: 'Pretendard', -apple-system, sans-serif;
        line-height: 1.6; word-break: keep-all; letter-spacing: -0.01em;
        overflow-x: hidden;
    }

/* 기본값: PC에서는 pc-br은 보이고, mo-br은 숨깁니다. */
.pc-br { display: block; content: ""; margin-top: 0; }
.mo-br { display: none; }

/* 모바일 화면 (768px 이하) 설정 */
@media (max-width: 768px) {
    /* 모바일에서는 pc-br을 숨기고, mo-br을 보이게 합니다. */
    .pc-br { display: none; }
    .mo-br { display: block; content: ""; margin-top: 0; }
}

    .mela-wrapper h1 { font-size: 4.95rem; font-weight: 700; color: #1d1d1f; margin-bottom: 20px; line-height: 1.15; letter-spacing: -0.04em; }
    .mela-wrapper h2 { font-size: 3.95rem; font-weight: 700; margin-bottom: 25px; line-height: 1.25; letter-spacing: -0.03em; }
    .mela-wrapper h3 { font-size: 1.55rem; font-weight: 600; color: #86868b; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.15em; }
    .mela-wrapper p { font-size: 1.65rem; color: #424245; font-weight: 400; line-height: 1.8; margin-bottom: 30px; }
    .mela-wrapper .hero-product-name { font-size: 2.65rem; font-weight: 600; color: #1d1d1f; margin-top: 10px; }
    .mela-hero-section { text-align: center; border-bottom: none; padding-top: 200px !important; }
    .mela-hero-brand { font-size: 1.6rem; font-weight: 600; color: #86868b; letter-spacing: 0.3em; margin: 0 0 20px; text-transform: uppercase; }
    .mela-hero-title { font-size: 7.2rem; font-weight: 900; color: #000; line-height: 1.08; letter-spacing: -0.05em; margin: 0 0 18px; }
    .mela-hero-subtitle { font-size: 3.5rem; font-weight: 700; color: #1d1d1f; margin: 0 0 22px; }
    .mela-hero-kicker { color: #86868b; font-weight: 600; margin-bottom: 42px; font-size: 1.65rem; line-height: 1.35; }
    .mela-hero-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; }
    .mela-hero-tag { background: #f5f5f7; padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 1.2rem; color: #86868b; line-height: 1.2; letter-spacing: -0.01em; }

    .mela-container { max-width: 1120px; margin: 0 auto; padding: 0 40px; }
    .mela-section { padding: 180px 0; border-bottom: 1px solid #f5f5f7; }
    .mela-grid-2 { display: flex; gap: 100px; align-items: center; justify-content: space-between; }
    .mela-feature-text, .mela-feature-media { flex: 1; width: 50%; }

    /* [미디어/컴포넌트] */
    .mela-media-box { width: 100%; background-color: #f5f5f7; border-radius: 40px; overflow: hidden; position: relative; height: 550px; }
    .mela-media-box img, .mela-media-box video { width: 100%; height: 100%; display: block; object-fit: cover; }
    .mela-media-overlay { position: absolute; bottom: 35px; left: 35px; font-size: 1.15rem; font-weight: 600; color: #1d1d1f; background: rgba(255,255,255,0.92); padding: 10px 20px; border-radius: 25px; backdrop-filter: blur(10px); z-index: 2; }

    /* [그래프 & 데이터 표] */
    .mela-graph-wrapper { background: #f5f5f7; border-radius: 40px; padding: 60px; text-align: center; }
    .mela-graph-container { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 70px; margin-top: 40px; border-bottom: 1px solid #d2d2d7; }
    .mela-bar { width: 70px; background: #d2d2d7; border-radius: 10px 10px 0 0; position: relative; }
    .mela-bar.active { background: #1d1d1f; }
    .mela-data-grid { border-top: 1px solid #d2d2d7; margin-top: 40px; }
    .mela-data-row { display: flex; justify-content: space-between; padding: 25px 0; border-bottom: 1px solid #d2d2d7; font-size: 1.35rem; }
    .mela-data-label { font-weight: 600; color: #1d1d1f; }
    .mela-data-value { font-weight: 700; color: #0071e3; }

    /* [스태츠 바] */
    .mela-stats-bar { display: flex; gap: 0; margin-top: 60px; border-top: 1px solid #d2d2d7; border-bottom: 1px solid #d2d2d7; padding: 45px 0; width: 100%; max-width: 1000px; }
    .mela-stat-item { flex: 1; text-align: center; position: relative; padding: 0 20px; }
    .mela-stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px; background-color: #d2d2d7; }
    .mela-stat-value { font-size: 3.35rem; font-weight: 700; display: block; color: #1d1d1f; margin-bottom: 8px; line-height: 1; }
    .mela-stat-label { font-size: 1.25rem; color: #86868b; font-weight: 600; }

    /* [언어 선택 플로팅 버튼 - UX 보완 버전] */
.mela-lang-dropdown { 
    position: fixed; 
    right: 30px; 
    bottom: 30px; 
    z-index: 10000; 
    padding-top: 20px; /* 상단 메뉴와의 연결을 위한 여백 */

.mela-lang-trigger { 
    width: 60px; height: 60px; background: #ffffff; border: 1px solid #d2d2d7; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-weight: 700; font-size: 16.7px; 
    color: #1d1d1f !important;
}

.mela-lang-menu { 
    position: absolute; 
    bottom: 68px; /* 버튼과 더 가깝게 조정 (75px -> 68px) */
    right: 0; 
    background: rgba(255, 255, 255, 0.98); 
    backdrop-filter: blur(20px); border: 1px solid #d2d2d7; border-radius: 20px; padding: 10px; 
    display: none; flex-direction: column; min-width: 170px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* [핵심] 버튼과 메뉴 사이의 빈 공간을 투명하게 메워주는 가교(Bridge) */
.mela-lang-menu::after {
    content: "";
    position: absolute;
    bottom: -15px; /* 메뉴 하단으로 15px만큼 투명 영역 확장 */
    left: 0;
    width: 100%;
    height: 15px;
    background: transparent;
}

.mela-lang-dropdown:hover .mela-lang-menu { 
    display: flex; 
}

.mela-lang-item { 
    padding: 14px 20px; text-decoration: none; 
    color: #1d1d1f !important; font-size: 17.7px; 
    border-radius: 14px; transition: 0.2s; font-weight: 500;
}

.mela-lang-item:hover { 
    background: rgba(0,0,0,0.05); 
    color: #1d1d1f !important; 
}

.mela-lang-item.active { 
    color: #0071e3 !important; 
    font-weight: 700; 
}

    /* --- [핵심] 모바일 순서 강제 교정 --- */
    @media (max-width: 768px) {
        .mela-container { padding: 0 40px; }
        .mela-section { padding: 100px 0; }
        .mela-grid-2 { flex-direction: column; gap: 50px; }

        .mela-hero-kicker { font-size: 1.3rem; margin-bottom: 28px; }
        .mela-hero-tag { font-size: 1.05rem; padding: 7px 14px; }

    const langToHtml = {
        kr: 'ko',
        en: 'en',

        jp: 'ja',
        cn: 'zh-CN',
    };

    const langToTrigger = {
        kr: 'KR',
        en: 'EN',
        fr: 'FR',
        jp: 'JP',
        cn: 'CN',
    };

    const contentEl = document.getElementById('mela-content');
    const triggerEl = document.getElementById('mela-lang-trigger');
    const menuEl = document.getElementById('mela-lang-menu');
    const langItems = Array.from(menuEl.querySelectorAll('.mela-lang-item'));

    function applyLanguage(lang) {
        if (!localizedContent[lang]) lang = 'kr';

        document.documentElement.lang = langToHtml[lang] || 'ko';
        triggerEl.textContent = langToTrigger[lang] || 'KR';
        contentEl.innerHTML = localizedContent[lang];

        langItems.forEach((item) => {
            item.classList.toggle('active', item.dataset.lang === lang);
        });

        localStorage.setItem('mela_lang', lang);
    }

    langItems.forEach((item) => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            applyLanguage(item.dataset.lang);
        });
    });

    const saved = localStorage.getItem('mela_lang');
    const browserLang = (navigator.language || '').toLowerCase();
    let initialLang = 'kr';

    if (saved && localizedContent[saved]) {
        initialLang = saved;
    } else if (browserLang.startsWith('en')) {
        initialLang = 'en';
    } else if (browserLang.startsWith('fr')) {
        initialLang = 'fr';
    } else if (browserLang.startsWith('ja')) {
        initialLang = 'jp';
    } else if (browserLang.startsWith('zh')) {
        initialLang = 'cn';
    }

    applyLanguage(initialLang);
})();
