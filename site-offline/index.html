<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Melanoir · 점검 중</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #000;
      color: #f3f4f8;
      font-family: "Barlow Condensed", "DIN Alternate", Bahnschrift, "Arial Narrow", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100vh;
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 40px;
      opacity: 0.92;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.05;
      margin-bottom: 18px;
    }
    p {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(243, 244, 248, 0.72);
      text-transform: none;
      letter-spacing: normal;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="https://res.cloudinary.com/dssuxurpt/image/upload/v1778836628/MELANOIR_sg2_white_bpaxvi.png" alt="Melanoir" width="140" height="20" decoding="async">
    <p class="eyebrow">SITE MAINTENANCE</p>
    <h1>일시적으로<br>접속이 중단되었습니다.</h1>
    <p>멜라누아 홈페이지를 점검 중입니다. 잠시 후 다시 방문해 주세요.</p>
  </div>
</body>
</html>
