<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/favicon-32.png" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>페이지를 찾을 수 없습니다 — Melanoir</title>
  <meta property="og:title" content="페이지를 찾을 수 없습니다 — Melanoir">
  <meta property="og:description" content="페이지를 찾을 수 없습니다 — Melanoir">
  <meta property="og:url" content="https://melanoir.co.kr/404">
  <link rel="stylesheet" href="/assets/design-tokens.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/melanoir-subpage-header.css">
  <link rel="stylesheet" href="/assets/mnr-ui.css">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-ink);
      font-family: 'Pretendard', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .not-found {
      flex: 1;
      text-align: center;
      padding: 120px 24px;
    }
    .not-found-eyebrow {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--color-text-dim);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .not-found h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 16px;
    }
    .not-found p {
      color: var(--color-text-muted);
      margin-bottom: 36px;
    }
    .not-found-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <header class="mnr-header">
    <div class="mnr-header-inner">
      <a class="mnr-header-logo" href="/">
        <img src="https://res.cloudinary.com/dssuxurpt/image/upload/v1778836628/MELANOIR_sg2_white_bpaxvi.png" alt="Melanoir" style="filter: invert(1);">
      </a>
      <button class="mnr-nav-toggle" type="button" aria-label="메뉴" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="mnr-nav">
        <a href="/products">Products</a>
        <a href="/#technology">Technology</a>
        <a href="/register">Club</a>
        <a href="/pro">Pro</a>
      </nav>
    </div>
  </header>

  <section class="not-found">
    <p class="not-found-eyebrow">404</p>
    <h1>페이지를 찾을 수 없습니다.</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
    <div class="not-found-actions">
      <a href="/" class="btn-primary">홈으로</a>
      <a href="/register" class="btn-secondary">정품 등록</a>
    </div>
  </section>

  <div data-mnr-explore="exclude:none"></div>
  <div data-mnr-footer data-theme="light"></div>

  <script src="/assets/mnr-nav.js"></script>
  <script src="/assets/mnr-ui.js"></script>
</body>
</html>
