<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Melanoir · Products</title>
  <meta name="description" content="멜라누아 제품 라인업 — Embo(PMU 잉크), Photoshield Core(광차폐 소재)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="../assets/melanoir-shell.css" />
  <link rel="stylesheet" href="../assets/melanoir-lang.css" />
  <link rel="stylesheet" href="../assets/melanoir-subpage-header.css" />
  <style>
    /* —— Products 페이지 헤더 섹션 —— */
    .products-header {
      padding: var(--shell-pad-y) var(--shell-pad-x) 22px;
      border-bottom: 1px solid var(--shell-line);
    }

    /* —— 제품 섹션 (풀 와이드, 배경 이미지) —— */
    .product-section {
      position: relative;
      min-height: 56vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      border-bottom: 1px solid var(--shell-line);
    }

    .product-section-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      transition: transform 560ms ease;
    }

    .product-section:hover .product-section-bg {
      transform: scale(1.02);
    }

    .product-section-scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.08) 0%,
        rgba(0, 0, 0, 0.38) 42%,
        rgba(0, 0, 0, 0.84) 76%,
        rgba(0, 0, 0, 0.97) 100%
      );
      pointer-events: none;
    }

    .product-section-body {
      position: relative;
      z-index: 2;
      padding: 32px var(--shell-pad-x);
    }

    .product-section-eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.5);
      margin: 0 0 10px;
      display: block;
    }

    .product-section h2 {
      font-size: clamp(26px, 7vw, 38px);
      letter-spacing: 0.04em;
      font-weight: 700;
      line-height: 1.0;
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.96);
    }

    .product-section-desc {
      font-family: var(--shell-font-ko);
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.68);
      margin: 0 0 22px;
      text-transform: none;
      letter-spacing: normal;
    }

    .product-section-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 18px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 2px;
      color: rgba(255, 255, 255, 0.92);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: none;
      font-family: var(--shell-font-ko);
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .product-section-cta:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #fff;
      color: #fff;
    }

    @media (prefers-reduced-motion: reduce) {
      .product-section-bg {
        transition: none;
      }
      .product-section:hover .product-section-bg {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <header data-mnr-header data-theme="dark" data-current="products"></header>
  <div class="app">
    <div id="melanoir-content"></div>
  </div>
  <script src="../assets/melanoir-lang.js"></script>
  <script src="../assets/mnr-ui.js"></script>
  <script src="../assets/mnr-nav.js"></script>
  <script>
    (function () {

      var pageMeta = {
        kr: { title: "Melanoir · 제품", description: "멜라누아 제품 라인업 — Embo(멜라닌 기반 PMU 잉크), Photoshield Core(광차폐 소재)" },

          "</div></section>" +
          '<footer class="site-footer"><p>© Melanoir · <a href="https://melanoir.co.kr" target="_blank" rel="noopener noreferrer">melanoir.co.kr</a></p></footer>'

      var copy = {

          lead: "멜라누아 제품 라인업. 각 제품 섹션에서 상세 페이지로 이동합니다.",

        en: {

          navProducts: "Products",
          navTechnology: "Technology",
          eyebrow: "PRODUCT LINEUP",
          pageTitle: "PRODUCTS",
          lead: "The Melanoir product lineup. Each section opens the full product story, specs, and proof points.",
          emboDesc: "Embo — formulation narrative, performance data, and the pursuit of the safest black.",
          psDesc: "Photoshield Core — technical brochure for our melanin-forward photoprotection shield.",
          cta: "Learn more",
        },
        fr: {
          navAria: "Principal",
          navProducts: "Produits",
          navTechnology: "Technologie",
          eyebrow: "GAMME PRODUITS",
          pageTitle: "PRODUITS",
          lead: "La gamme produits Melanoir. Chaque section mène à l'histoire complète du produit.",
          emboDesc: "Embo — récit, fiches techniques et données de performance.",
          psDesc: "Photoshield Core — brochure technique autour du bouclier à base de mélanine.",
          cta: "En savoir plus",
        },
        jp: {
          navAria: "メイン",
          navProducts: "製品",
          navTechnology: "テクノロジー",
          eyebrow: "PRODUCT LINEUP",
          pageTitle: "PRODUCTS",
          lead: "メラヌア 製品ラインアップ。各セクションから商品の詳細ページへ進みます。",
          emboDesc: "Embo — 製品スペック、ブランドストーリー、検証データ。",
          psDesc: "Photoshield Core — メラニンシールドの技術ブローシャー。",
          cta: "詳しく見る",
        },
        cn: {
          navAria: "主导航",
          navProducts: "产品",
          navTechnology: "技术",
          eyebrow: "PRODUCT LINEUP",
          pageTitle: "PRODUCTS",
          lead: "Melanoir 产品线。点击各部分进入完整产品故事与数据页面。",
          emboDesc: "Embo — 产品规格、品牌叙事与验证数据。",
          psDesc: "Photoshield Core — 以黑色素为核心的防护技术手册。",
          cta: "了解更多",
        },
      };

      var localizedContent = {};
      Object.keys(copy).forEach(function (lang) {
        localizedContent[lang] = shellPage(copy[lang]);
      });

      function applyMeta(lang) {
        var meta = pageMeta[lang] || pageMeta.kr;
        document.title = meta.title;
        var desc = document.querySelector('meta[name="description"]');
        if (desc) desc.setAttribute("content", meta.description);
      }

      MelanoirLang.init({
        theme: "dark",
        contentSelector: "#melanoir-content",
        localizedContent: localizedContent,
        onApply: applyMeta,
      });
    })();
  </script>
</body>
</html>
