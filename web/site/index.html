<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Melanoir · Melanin</title>
  <meta name="description" content="멜라닌 — 자연이 설계한 보호. 지구에서 가장 안전한 Black, For the Safest Black in the Universe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="assets/melanoir-shell.css" />
  <link rel="stylesheet" href="assets/melanoir-lang.css" />
  <style>
    /*
     * 히어로 배경 영상 튜닝
     * — `.section--hero` 안의 --hero-video-* 값만 바꿔가며 저장·새로고침하면 됩니다.
     *
     * 크롭이 심할 때(확대가 과함):
     *   --hero-video-min-w / --hero-video-min-h 를 100%에 가깝게 낮추거나
     *   --hero-video-extra-scale 를 1보다 작게(예: 0.88~0.95)
     * 잘림 없이 전체 프레임:
     *   --hero-video-fit: contain;  + min-w/min-h 는 보통 100% 권장(빈 검정 띠 생길 수 있음)
     */
    .section--hero {
      position: relative;
      isolation: isolate;
      min-height: calc(100dvh - 56px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 48px;
      overflow: hidden;

      --hero-video-fit: cover;
      --hero-video-min-w: 59%;
      --hero-video-min-h: 50%;
      --hero-video-extra-scale: 0.8;
      --hero-video-anchor-x: 72%;
      --hero-video-anchor-y: 50%;
      --hero-video-object-x: 92%;
      --hero-video-object-y: center;
      --hero-video-mirror: -1;
      --hero-video-brightness: 1.33;
      --hero-video-contrast: 1.06;
    }

    @media (min-width: 480px) {
      .section--hero {
        --hero-video-min-w: 125%;
        --hero-video-anchor-x: 78%;
        --hero-video-object-x: 96%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-video-bg video {
        opacity: 0;
        visibility: hidden;
      }

      .section--hero {
        background: #000;
      }
    }

    .hero-video-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-video-bg video {
      position: absolute;
      top: var(--hero-video-anchor-y);
      left: var(--hero-video-anchor-x);
      transform: translate(-50%, -50%) scale(var(--hero-video-extra-scale)) scaleX(var(--hero-video-mirror));
      min-width: var(--hero-video-min-w);
      min-height: var(--hero-video-min-h);
      width: auto;
      height: auto;
      object-fit: var(--hero-video-fit);
      object-position: var(--hero-video-object-x) var(--hero-video-object-y);
      filter: brightness(var(--hero-video-brightness)) contrast(var(--hero-video-contrast));
    }

    .hero-video-scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.97) 0%, rgba(0, 0, 0, 0.72) 36%, rgba(0, 0, 0, 0.18) 62%, rgba(0, 0, 0, 0.06) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.35) 0%, transparent 42%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
    }

    .section--hero > *:not(.hero-video-bg):not(.hero-video-scrim) {
      position: relative;
      z-index: 2;
    }

    .hero-mission .mission-eyebrow,
    .hero-mission .mission-en {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--shell-text-dim);
      margin-bottom: 12px;
    }

    .hero-mission .mission-body,
    .hero-mission .mission-ko {
      display: block;
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1.12;
      letter-spacing: 0.02em;
      font-weight: 600;
      text-transform: none;
      font-family: var(--shell-font-ko);
      color: rgba(243, 244, 248, 0.96);
    }

    .hero-promise {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--shell-line-strong);
    }

    .hero-promise-primary,
    .hero-promise-ko {
      margin: 0 0 10px;
      font-size: clamp(18px, 4.5vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      text-transform: none;
      letter-spacing: -0.02em;
      font-family: var(--shell-font-ko);
      color: rgba(255, 255, 255, 0.96);
    }

    .hero-promise-primary:last-child,
    .hero-promise-ko:last-child {
      margin-bottom: 0;
    }

    .hero-promise-secondary,
    .hero-promise-en {
      margin: 0;
      font-size: clamp(14px, 3.2vw, 18px);
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.04em;
      text-transform: none;
      color: var(--shell-text-dim);
    }

    .scroll-hint {
      margin: 36px 0 0;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.45);
    }

    .hero-title {
      font-size: clamp(34px, 11vw, 56px);
      line-height: 0.95;
      letter-spacing: 0.05em;
      font-weight: 700;
      margin: 0 0 16px;
    }

    .section-head {
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.02;
      letter-spacing: 0.05em;
      font-weight: 700;
      margin: 0 0 18px;
    }

    .section-head--ko {
      text-transform: none;
      font-family: var(--shell-font-ko);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .section-head--sentence {
      text-transform: none;
      letter-spacing: 0.02em;
      line-height: 1.08;
      font-size: clamp(22px, 5.8vw, 34px);
      max-width: none;
    }

    .prose {
      margin: 0 0 28px;
    }

    .prose:last-child {
      margin-bottom: 0;
    }

    .section-visual {
      margin: 0 0 22px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--shell-line);
      background: #0a0a0c;
    }

    .section-visual img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    @media (min-width: 480px) {
      .stat-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .stat-cell {
      border: 1px solid var(--shell-line);
      border-radius: 14px;
      padding: 18px 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
    }

    .stat-cell dt {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(243, 244, 248, 0.95);
      margin: 0 0 8px;
    }

    .stat-cell dd {
      margin: 0;
      text-transform: none;
      letter-spacing: normal;
      font-family: var(--shell-font-ko);
      font-size: 14px;
      line-height: 1.55;
      color: var(--shell-text-dim);
    }

    .domain-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 22px;
    }

    .domain-cell {
      border: 1px solid var(--shell-line);
      border-radius: 14px;
      padding: 18px 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
    }

    .domain-cell h3 {
      font-size: 18px;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
    }

    .domain-cell p {
      margin: 0;
      text-transform: none;
      letter-spacing: normal;
      font-family: var(--shell-font-ko);
      font-size: 14px;
      line-height: 1.55;
      color: var(--shell-text-dim);
    }

    /* —— 모션 (recruitment 페이지와 동일 패턴) —— */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 560ms ease, transform 560ms ease;
      will-change: opacity, transform;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stagger-item {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 460ms ease, transform 460ms ease;
    }

    .stagger-item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hero-mission .mission-eyebrow,
    .hero-mission .mission-en { transition-delay: 0ms; }
    .hero-mission .mission-body,
    .hero-mission .mission-ko { transition-delay: 100ms; }
    .hero-promise { transition-delay: 200ms; }
    .scroll-hint { transition-delay: 320ms; }

    .stat-cell,
    .domain-cell {
      transition: transform 260ms ease, border-color 260ms ease, background-color 260ms ease;
    }

    .stat-cell:hover,
    .domain-cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
    }

    .section-visual {
      transition: border-color 320ms ease, transform 560ms ease;
    }

    .section-visual.is-visible {
      transform: scale(1);
    }

    .section-visual:not(.is-visible) {
      transform: scale(0.98);
    }

    .scroll-hint {
      animation: scroll-hint-pulse 2.4s ease-in-out infinite;
    }

    @keyframes scroll-hint-pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.85; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal,
      .stagger-item,
      .stat-cell,
      .domain-cell,
      .section-visual,
      .scroll-hint {
        transition: none !important;
        animation: none !important;
      }

      .reveal,
      .stagger-item,
      .section-visual {
        opacity: 1 !important;
        transform: none !important;
      }

      .scroll-hint {
        opacity: 0.45;
      }
    }
    html[lang="ja"] .section-head--sentence,
    html[lang="zh-CN"] .section-head--sentence,
    html[lang="zh"] .section-head--sentence {
      font-size: clamp(20px, 5.2vw, 30px);
      line-height: 1.22;
    }

    html[lang="ja"] .hero-mission .mission-body,
    html[lang="zh-CN"] .hero-mission .mission-body,
    html[lang="zh"] .hero-mission .mission-body {
      font-size: clamp(20px, 5.5vw, 30px);
      line-height: 1.28;
    }



    /* —— trajectory 비주얼 (이미지/비디오) —— */
    .traj-visual {
      margin: 0 0 16px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--shell-line);
      background: #0a0a0c;
    }

    .traj-visual img,
    .traj-visual video {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
    }

    .traj-visual--video video {
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    /* —— 멜라닌 섹션 CTA 링크 —— */
    .section-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 3px;
      transition: color 200ms ease, border-color 200ms ease;
    }

    .section-cta::after {
      content: "→";
      font-size: 13px;
      letter-spacing: 0;
    }

    .section-cta:hover {
      color: rgba(255, 255, 255, 0.92);
      border-color: rgba(255, 255, 255, 0.45);
    }

    /* —— trajectory 리스트 카드 —— */
    .traj-list {
      margin-top: 22px;
    }

    .traj-item {
      padding: 26px 0;
      border-top: 1px solid var(--shell-line);
    }

    .traj-item:last-child {
      border-bottom: 1px solid var(--shell-line);
    }

    .traj-eyebrow {
      margin: 0 0 10px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--shell-text-dim);
      text-transform: uppercase;
    }

    .traj-title {
      font-family: var(--shell-font-ko);
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.96);
      margin: 0 0 12px;
      text-transform: none;
    }

    .traj-desc {
      font-family: var(--shell-font-ko);
      font-size: 14px;
      line-height: 1.68;
      color: var(--shell-text-dim);
      margin: 0 0 16px;
      text-transform: none;
      letter-spacing: normal;
    }

    .traj-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      padding-bottom: 2px;
      transition: color 200ms ease, border-color 200ms ease;
    }

    .traj-cta::after {
      content: "→";
      font-size: 13px;
      letter-spacing: 0;
    }

    .traj-cta:hover {
      color: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.42);
    }

    /* —— 한국어 헤딩 스타일 재정의 —— */
    html[lang="ko"] #melanin-title {
      font-family: var(--shell-font-ko);
      font-size: clamp(24px, 6.5vw, 38px);
      letter-spacing: -0.02em;
      text-transform: none;
      line-height: 1.12;
    }

    html[lang="ko"] #domains-title {
      font-family: var(--shell-font-ko);
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    html[lang="ja"] #melanin-title,
    html[lang="zh-CN"] #melanin-title {
      font-family: var(--shell-font-ko);
      font-size: clamp(22px, 5.8vw, 34px);
      text-transform: none;
      letter-spacing: -0.01em;
    }

  </style>
</head>
<body>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>
  <div class="app">
    <div id="melanoir-content"></div>
  </div>
  <a class="melanoir-hire-fab" href="/recruitment" aria-label="2026년 상반기 채용 — 멜라누아 R&amp;D 팀에 합류하기">
    [2026년 상반기 채용]<br>멜라누아 R&amp;D 팀에 합류하기
  </a>

  <script src="assets/landing-i18n.js"></script>
  <script src="assets/melanoir-lang.js"></script>
  <script>
    (function () {
      function initHeroVideo(root) {
        var v = (root || document).querySelector("#heroMissionVideo");
        if (!v) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          v.pause();
          v.removeAttribute("autoplay");
          return;
        }
        v.setAttribute("autoplay", "");
        v.muted = true;
        var playPromise = v.play();
        if (playPromise && playPromise.catch) playPromise.catch(function () {});
      }

      function initLandingMotion(root) {
        root = root || document;
        var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var revealTargets = root.querySelectorAll(".reveal");
        var staggerItems = root.querySelectorAll(".stagger-item");

        revealTargets.forEach(function (el) {
          el.classList.remove("is-visible");
        });
        staggerItems.forEach(function (el) {
          el.classList.remove("is-visible");
        });

        initHeroVideo(root);

        if (reduceMotion) {
          revealTargets.forEach(function (el) { el.classList.add("is-visible"); });
          staggerItems.forEach(function (el) { el.classList.add("is-visible"); });
          return;
        }

        var heroReveals = root.querySelectorAll(".section--hero .reveal");
        heroReveals.forEach(function (el, idx) {
          window.setTimeout(function () {
            el.classList.add("is-visible");
          }, 80 + idx * 100);
        });

        var scrollReveals = Array.prototype.filter.call(revealTargets, function (el) {
          return !el.closest(".section--hero");
        });

        var io = "IntersectionObserver" in window
          ? new IntersectionObserver(function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("is-visible");
                  io.unobserve(entry.target);
                }
              });
            }, { threshold: 0.14, rootMargin: "0px 0px -8% 0px" })
          : null;

        if (io) {
          scrollReveals.forEach(function (el) { io.observe(el); });
        } else {
          scrollReveals.forEach(function (el) { el.classList.add("is-visible"); });
        }

        function revealStagger(container) {
          var items = container.querySelectorAll(".stagger-item");
          items.forEach(function (el, idx) {
            window.setTimeout(function () {
              el.classList.add("is-visible");
            }, idx * 90);
          });
        }

        root.querySelectorAll("[data-stagger]").forEach(function (container) {
          if ("IntersectionObserver" in window) {
            var staggerObserver = new IntersectionObserver(function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  revealStagger(entry.target);
                  staggerObserver.unobserve(entry.target);
                }
              });
            }, { threshold: 0.2 });
            staggerObserver.observe(container);
          } else {
            revealStagger(container);
          }
        });
      }

      function applyMeta(lang) {
        var meta = LandingI18n.PAGE_META[lang] || LandingI18n.PAGE_META.kr;
        document.title = meta.title;
        var desc = document.querySelector('meta[name="description"]');
        if (desc) desc.setAttribute("content", meta.description);
      }

      MelanoirLang.init({
        theme: "dark",
        contentSelector: "#melanoir-content",
        localizedContent: LandingI18n.buildLocalizedContent(),
        onApply: function (lang) {
          applyMeta(lang);
          initLandingMotion(document.getElementById("melanoir-content"));
        },
      });
    })();
  </script>
  <script>
    (function () {
      var bar = document.getElementById("scrollProgress");
      if (!bar) return;
      function tick() {
        var y = window.scrollY || window.pageYOffset;
        var max = document.documentElement.scrollHeight - window.innerHeight;
        var p = max > 0 ? (y / max) * 100 : 0;
        bar.style.width = Math.max(0, Math.min(100, p)) + "%";
      }
      tick();
      window.addEventListener("scroll", tick, { passive: true });
      window.addEventListener("resize", tick);
    })();
  </script>
</body>
</html>
